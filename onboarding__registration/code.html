<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding - Registration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0a47c2",
                        "accent": "#f37021",
                        "background-light": "#f5f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Lexend', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-[#111318] dark:text-white transition-colors duration-200">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden max-w-[430px] mx-auto bg-white dark:bg-background-dark shadow-2xl">
<!-- Top Navigation -->
<div class="flex items-center p-4 pb-2 justify-end">
<button class="px-4 py-2 text-[#606e8a] dark:text-gray-400 text-base font-bold leading-normal tracking-[0.015em] hover:text-primary transition-colors">
                Skip
            </button>
</div>
<!-- Main Content Scroll Area -->
<div class="flex-1 flex flex-col items-center px-6">
<!-- Header Image / Illustration Area -->
<div class="w-full @container mt-4">
<div class="@[480px]:px-4 @[480px]:py-3">
<div class="w-full bg-center bg-no-repeat bg-contain flex flex-col justify-end overflow-hidden rounded-xl min-h-[340px]" data-alt="Illustration of a happy student wearing a graduation gown and cap" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDpFPASMC0Pax3UJvy5zGMoWa0xGUWSn8YC1IZtDu0LDT2h7siX2Qn1LfSRHOeozLpMRFrVPqKQu9GX8pf7DzEPCNKIjAzTKM-5-7Zdg71-fQx1AUtOzmpXYYxq3Q1IiSkmeRPhLr5uJvcLpTyY7cVrw5oh__Mod3yokHOMFUq4mjFl1dKpOCZMdXs-oUvQR6c1iEecCGdQTisel-izQtcOT39DWzKd3kS6GORsNdqIhbSSPbMLkiyPEDqzyLDuJZLlLD7X7o1R7Q");'>
<!-- Decorative Gradient Overlay (Optional) -->
<div class="h-full w-full bg-gradient-to-t from-primary/10 to-transparent"></div>
</div>
</div>
</div>
<!-- Text Content -->
<div class="mt-8 text-center">
<h1 class="text-[#111318] dark:text-white tracking-tight text-[32px] font-bold leading-tight pb-3">
                    Easily Register for Graduation
                </h1>
<p class="text-[#4f5b71] dark:text-gray-400 text-base font-normal leading-relaxed px-4">
                    Quickly sign up for your ceremony and select your gown size in just a few taps.
                </p>
</div>
<!-- Pagination Indicators -->
<div class="flex w-full flex-row items-center justify-center gap-3 py-10">
<div class="h-2 w-6 rounded-full bg-primary"></div>
<div class="h-2 w-2 rounded-full bg-[#dbdfe6] dark:bg-gray-700"></div>
<div class="h-2 w-2 rounded-full bg-[#dbdfe6] dark:bg-gray-700"></div>
</div>
</div>
<!-- Bottom Actions -->
<div class="p-6 pb-10 flex flex-col gap-4">
<button class="w-full h-14 bg-primary text-white text-lg font-bold rounded-xl flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all">
<span>Next</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<!-- Branding Accent -->
<div class="flex justify-center items-center gap-2">
<div class="h-1 w-8 rounded-full bg-accent"></div>
<p class="text-[10px] uppercase tracking-widest font-bold text-primary/60 dark:text-primary/40">FPT Greenwich</p>
<div class="h-1 w-8 rounded-full bg-accent"></div>
</div>
</div>
</div>
</body></html>
