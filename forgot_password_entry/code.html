<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Forgot Password - FPT Greenwich</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0a47c2",
                        "accent": "#f97316",
                        "background-light": "#f5f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Lexend', sans-serif;
        }
        .ios-status-bar {
            height: 44px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center">
<!-- Main Container (Phone Form Factor) -->
<div class="relative flex min-h-screen w-full max-w-[430px] flex-col bg-white dark:bg-background-dark shadow-2xl overflow-x-hidden">
<!-- iOS Status Bar Placeholder -->
<div class="flex items-center justify-between px-8 pt-4 pb-2 text-black dark:text-white">
<span class="text-sm font-semibold">9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-symbols-outlined text-sm">signal_cellular_alt</span>
<span class="material-symbols-outlined text-sm">wifi</span>
<span class="material-symbols-outlined text-sm">battery_full</span>
</div>
</div>
<!-- Top App Bar -->
<div class="flex items-center bg-white dark:bg-background-dark p-4 pb-2">
<div class="text-[#111318] dark:text-white flex size-12 shrink-0 items-center justify-start cursor-pointer">
<span class="material-symbols-outlined">arrow_back_ios</span>
</div>
</div>
<!-- Brand/Logo Section -->
<div class="flex flex-col items-center pt-8 pb-4 px-4">
<div class="w-16 h-16 bg-primary/10 rounded-2xl flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-primary text-4xl">lock_reset</span>
</div>
<div class="h-1 w-12 bg-accent rounded-full mb-2"></div>
</div>
<!-- Headline Text -->
<h1 class="text-[#111318] dark:text-white tracking-tight text-[32px] font-bold leading-tight px-6 text-left pb-2 pt-4 font-display">
            Forgot Password?
        </h1>
<!-- Body Text -->
<p class="text-[#4f5b71] dark:text-gray-400 text-base font-normal leading-relaxed pb-6 pt-1 px-6">
            Enter your registered <span class="text-primary font-medium">email</span> or <span class="text-primary font-medium">Student ID</span> below. We will send you a link to reset your password.
        </p>
<!-- TextField Component -->
<div class="flex flex-col gap-4 px-6 py-3">
<label class="flex flex-col w-full">
<p class="text-[#111318] dark:text-white text-sm font-semibold leading-normal pb-2 uppercase tracking-wider">Student ID / Email</p>
<div class="relative">
<input class="form-input flex w-full rounded-lg text-[#111318] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-[#dbdfe6] dark:border-gray-700 bg-white dark:bg-background-dark focus:border-primary h-14 placeholder:text-[#9ca3af] px-4 text-base font-normal leading-normal transition-all" placeholder="e.g. GCH210123 or name@greenwich.edu.vn" type="text" value=""/>
</div>
</label>
</div>
<!-- Primary Action Button -->
<div class="flex px-6 py-6 mt-4">
<button class="flex min-w-[84px] w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary text-white text-base font-bold leading-normal tracking-wide shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all active:scale-[0.98]">
<span class="truncate">Send Reset Link</span>
</button>
</div>
<!-- Secondary Navigation -->
<div class="flex justify-center px-6 py-4 mt-auto mb-8">
<p class="text-[#606e8a] dark:text-gray-400 text-sm font-medium">
                Remember your password? 
                <a class="text-primary hover:text-primary/80 ml-1 font-bold" href="#">Back to Login</a>
</p>
</div>
<!-- Brand Footer Accent -->
<div class="flex justify-center pb-10">
<div class="flex gap-2">
<div class="w-8 h-1 bg-primary rounded-full"></div>
<div class="w-8 h-1 bg-accent rounded-full"></div>
</div>
</div>
<!-- iOS Home Indicator -->
<div class="flex justify-center pb-2">
<div class="w-32 h-1.5 bg-gray-200 dark:bg-gray-700 rounded-full"></div>
</div>
</div>
</body></html>
