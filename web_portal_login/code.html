<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FPT Greenwich - Graduation Portal Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0a47c2",
                        "accent-orange": "#f58220",
                        "background-light": "#f5f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Lexend', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center">
<div class="relative flex h-full min-h-screen w-full max-w-[480px] flex-col bg-white dark:bg-background-dark shadow-2xl overflow-x-hidden">
<!-- Header Image Section -->
<div class="@container">
<div class="relative">
<div class="bg-cover bg-center flex flex-col justify-end overflow-hidden min-h-[300px]" data-alt="Graduating students throwing caps in front of FPT building" style='background-image: linear-gradient(180deg, rgba(10, 71, 194, 0.4) 0%, rgba(10, 71, 194, 0.8) 100%), url("https://lh3.googleusercontent.com/aida-public/AB6AXuD8_0oESbggVCzQoWhvocIrsNfz_o0JLZBpbmPJ9dWoBMYxv1so0nvWPHdnUQra48n-HxWeDkPrqTQuEIS2R7DgHRJT9eyLoGBe1CQdbhfwPwp831Ps5mblylcBB1UjvQrbPDOmeVrXi2GTMkmR9VlitHYgjcH5Frnz_ypjWSq53dzo_DIdH85b21fMEsEZi8BNS1Cr5-7vyGVnH3Fn6oUZHsm2fCs-Mi9juD1VqpoZuB9NDOuncwTH-z_1iBh4mzFUd4UIazDSLQ");'>
<div class="p-6 pb-10">
<div class="mb-4 inline-block bg-white/20 backdrop-blur-md px-3 py-1 rounded-full border border-white/30">
<p class="text-white text-xs font-semibold tracking-wider uppercase">FPT Greenwich University</p>
</div>
<h1 class="text-white tracking-tight text-3xl font-bold leading-tight">Graduation <br/>Management Portal</h1>
</div>
</div>
<!-- Brand Accent Bar -->
<div class="absolute bottom-0 left-0 w-full h-1 bg-accent-orange"></div>
</div>
</div>
<!-- Login Form Container -->
<div class="flex-1 bg-white dark:bg-background-dark px-6 py-8 -mt-6 rounded-t-3xl relative z-10 shadow-[0_-10px_20px_rgba(0,0,0,0.05)]">
<!-- Headline Text -->
<div class="mb-8">
<h2 class="text-[#111318] dark:text-white text-[24px] font-bold leading-tight">Welcome Back</h2>
<p class="text-[#606e8a] dark:text-gray-400 text-sm mt-1">Please sign in to your administrative account</p>
</div>
<!-- Input Fields -->
<div class="space-y-4">
<!-- Admin Email Field -->
<div class="flex flex-col w-full">
<p class="text-[#111318] dark:text-white text-sm font-medium leading-normal pb-2">Admin Email</p>
<div class="flex w-full items-stretch rounded-lg group">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111318] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-[#dbdfe6] dark:border-gray-700 bg-white dark:bg-gray-800 focus:border-primary h-14 placeholder:text-[#606e8a] p-[15px] rounded-r-none border-r-0 pr-2 text-base font-normal leading-normal transition-all" placeholder="admin@greenwich.edu.vn" type="email" value=""/>
<div class="text-[#606e8a] flex border border-[#dbdfe6] dark:border-gray-700 bg-white dark:bg-gray-800 items-center justify-center pr-[15px] rounded-r-lg border-l-0">
<span class="material-symbols-outlined text-[24px]">mail</span>
</div>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col w-full">
<p class="text-[#111318] dark:text-white text-sm font-medium leading-normal pb-2">Password</p>
<div class="flex w-full items-stretch rounded-lg group">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111318] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-[#dbdfe6] dark:border-gray-700 bg-white dark:bg-gray-800 focus:border-primary h-14 placeholder:text-[#606e8a] p-[15px] rounded-r-none border-r-0 pr-2 text-base font-normal leading-normal transition-all" placeholder="Enter your password" type="password" value=""/>
<div class="text-[#606e8a] flex border border-[#dbdfe6] dark:border-gray-700 bg-white dark:bg-gray-800 items-center justify-center pr-[15px] rounded-r-lg border-l-0">
<span class="material-symbols-outlined text-[24px]">visibility</span>
</div>
</div>
</div>
</div>
<!-- Controls Row -->
<div class="flex items-center justify-between mt-6">
<label class="flex items-center gap-2 cursor-pointer group">
<div class="relative flex items-center justify-center">
<input class="peer h-5 w-5 rounded border-[#dbdfe6] border-2 bg-transparent text-primary focus:ring-0 focus:ring-offset-0 transition-all checked:bg-primary" type="checkbox"/>
</div>
<span class="text-[#111318] dark:text-gray-300 text-sm font-medium select-none">Remember Me</span>
</label>
<a class="text-primary hover:text-primary/80 text-sm font-semibold transition-colors" href="#">Forgot Password?</a>
</div>
<!-- Primary Action Button -->
<div class="mt-8">
<button class="w-full flex h-14 items-center justify-center rounded-xl bg-primary text-white text-base font-bold shadow-lg shadow-primary/20 hover:bg-primary/90 active:scale-[0.98] transition-all">
                    Login to Dashboard
                </button>
</div>
<!-- Footer Links -->
<div class="mt-10 flex flex-col items-center gap-4">
<div class="flex items-center gap-2 text-sm text-[#606e8a] dark:text-gray-400">
<span>Having trouble?</span>
<a class="text-primary font-semibold flex items-center gap-1" href="#">
                        Contact Support
                        <span class="material-symbols-outlined text-[16px]">help</span>
</a>
</div>
<div class="flex items-center gap-1 text-[10px] text-[#b0b8c4] uppercase tracking-widest mt-4">
<span>Powered by</span>
<span class="font-bold text-primary">FPT Information System</span>
</div>
</div>
</div>
<!-- iOS Home Indicator Spacing -->
<div class="h-8 bg-white dark:bg-background-dark"></div>
</div>
</body></html>
