<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding - Event Day</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Theme Configuration -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#0a47c2",
              "background-light": "#f5f6f8",
              "background-dark": "#101622",
            },
            fontFamily: {
              "display": ["Lexend", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex min-h-screen w-full flex-col items-center justify-between overflow-x-hidden bg-background-light dark:bg-background-dark max-w-md mx-auto">
<!-- Top Navigation -->
<div class="flex w-full items-center bg-transparent p-4 justify-between">
<button class="text-slate-900 dark:text-white flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined text-2xl">arrow_back_ios</span>
</button>
<div class="flex-1"></div>
<button class="text-primary font-semibold text-base px-2">Skip</button>
</div>
<!-- Illustration/Header Image -->
<div class="w-full @container px-6">
<div class="relative w-full aspect-square bg-white dark:bg-slate-800 rounded-3xl shadow-sm flex items-center justify-center overflow-hidden border border-slate-100 dark:border-slate-700">
<!-- Abstract Illustration of Student scanning QR at Hall -->
<div class="absolute inset-0 bg-gradient-to-br from-primary/10 to-transparent"></div>
<div class="z-10 flex flex-col items-center text-center p-8">
<div class="w-48 h-48 bg-white rounded-2xl shadow-xl flex items-center justify-center mb-6 relative" data-alt="Student scanning QR code at graduation hall entrance">
<!-- QR Code representation -->
<div class="p-4 border-2 border-primary rounded-xl">
<span class="material-symbols-outlined text-primary text-8xl" style="font-variation-settings: 'FILL' 0, 'wght' 200;">qr_code_2</span>
</div>
<!-- Scanner Beam effect -->
<div class="absolute top-1/2 left-0 w-full h-1 bg-primary/40"></div>
</div>
<div class="flex gap-2 items-center text-primary font-medium">
<span class="material-symbols-outlined">meeting_room</span>
<span>Main Graduation Hall</span>
</div>
</div>
</div>
</div>
<!-- Text Content Area -->
<div class="w-full flex flex-col items-center px-8 pt-8 pb-4">
<!-- Headline -->
<h1 class="text-slate-900 dark:text-white tracking-tight text-3xl font-bold leading-tight text-center pb-4">
                Smooth Check-in Experience
            </h1>
<!-- Body Text -->
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed text-center">
                Use your digital E-Ticket for a seamless entry and real-time ceremony updates.
            </p>
</div>
<!-- Bottom Controls -->
<div class="w-full flex flex-col items-center gap-8 pb-10 px-6">
<!-- Page Indicators -->
<div class="flex w-full flex-row items-center justify-center gap-2">
<div class="h-2 w-2 rounded-full bg-slate-300 dark:bg-slate-700"></div>
<div class="h-2 w-2 rounded-full bg-slate-300 dark:bg-slate-700"></div>
<div class="h-2 w-6 rounded-full bg-primary"></div>
</div>
<!-- CTA Button -->
<button class="w-full bg-primary text-white text-lg font-bold py-4 rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform">
                Get Started
            </button>
<!-- Safe area spacer for iOS -->
<div class="h-2"></div>
</div>
</div>
</body></html>
