<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>API &amp; Integration Settings - FPT Greenwich</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#0a47c2",
                "background-light": "#f5f6f8",
                "background-dark": "#101622",
              },
              fontFamily: {
                "display": ["Inter"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        /* Custom scrollbar for better look in dark mode */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #3b4354;
            border-radius: 10px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white min-h-screen flex flex-col">
<!-- TopAppBar Component -->
<header class="sticky top-0 z-50 bg-background-light dark:bg-background-dark border-b border-slate-200 dark:border-[#3b4354]">
<div class="flex items-center p-4 pb-2 justify-between">
<div class="text-slate-900 dark:text-white flex size-12 shrink-0 items-center justify-center cursor-pointer">
<span class="material-symbols-outlined">arrow_back_ios</span>
</div>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">API &amp; Integration</h2>
</div>
</header>
<main class="flex-1 overflow-y-auto pb-24">
<!-- Tabs Component -->
<div class="pb-3 sticky top-[64px] bg-background-light dark:bg-background-dark z-40">
<div class="flex border-b border-slate-200 dark:border-[#3b4354] px-4 gap-8 overflow-x-auto no-scrollbar">
<a class="flex flex-col items-center justify-center border-b-[3px] border-primary text-primary pb-[13px] pt-4 shrink-0" href="#">
<p class="text-sm font-bold leading-normal tracking-[0.015em]">Payment</p>
</a>
<a class="flex flex-col items-center justify-center border-b-[3px] border-transparent text-slate-500 dark:text-[#9ca6ba] pb-[13px] pt-4 shrink-0" href="#">
<p class="text-sm font-bold leading-normal tracking-[0.015em]">Email SMTP</p>
</a>
<a class="flex flex-col items-center justify-center border-b-[3px] border-transparent text-slate-500 dark:text-[#9ca6ba] pb-[13px] pt-4 shrink-0" href="#">
<p class="text-sm font-bold leading-normal tracking-[0.015em]">Webhooks</p>
</a>
</div>
</div>
<!-- Section: Payment Gateway -->
<section class="mt-4">
<div class="flex items-center justify-between px-4">
<h2 class="text-slate-900 dark:text-white text-[22px] font-bold leading-tight tracking-[-0.015em] pt-5 pb-3">Payment Gateway</h2>
<div class="flex items-center gap-1.5 pt-5 pb-3">
<span class="flex size-2 rounded-full bg-green-500"></span>
<span class="text-xs font-medium text-green-500">Connected</span>
</div>
</div>
<div class="px-4 py-2 space-y-4">
<!-- Dropdown Provider -->
<div class="flex flex-wrap items-end gap-4">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-700 dark:text-white text-base font-medium leading-normal pb-2">Provider</p>
<div class="relative">
<select class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-white focus:outline-0 focus:ring-1 focus:ring-primary border border-slate-200 dark:border-[#3b4354] bg-white dark:bg-[#1b1f27] h-14 placeholder:text-slate-400 dark:placeholder:text-[#9ca6ba] p-[15px] text-base font-normal leading-normal appearance-none">
<option value="momo">Momo E-Wallet</option>
<option selected="" value="vnpay">VNPay Gateway</option>
<option value="stripe">Stripe</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">unfold_more</span>
</div>
</label>
</div>
<!-- Merchant ID Field -->
<div class="flex flex-wrap items-end gap-4">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-700 dark:text-white text-base font-medium leading-normal pb-2">Merchant ID</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-white focus:outline-0 focus:ring-1 focus:ring-primary border border-slate-200 dark:border-[#3b4354] bg-white dark:bg-[#1b1f27] h-14 placeholder:text-slate-400 dark:placeholder:text-[#9ca6ba] p-[15px] text-base font-normal leading-normal" value="FPT_GRW_882910"/>
</label>
</div>
<!-- Secret Key Field (Masked) -->
<div class="flex flex-wrap items-end gap-4">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-700 dark:text-white text-base font-medium leading-normal pb-2">Secret Key</p>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-white focus:outline-0 focus:ring-1 focus:ring-primary border border-slate-200 dark:border-[#3b4354] bg-white dark:bg-[#1b1f27] h-14 placeholder:text-slate-400 dark:placeholder:text-[#9ca6ba] p-[15px] text-base font-normal leading-normal" type="password" value="••••••••••••••••••••••••"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer text-slate-400">visibility</span>
</div>
</label>
</div>
<button class="w-full flex items-center justify-center gap-2 bg-slate-200 dark:bg-primary/20 hover:bg-primary/30 text-primary font-bold py-4 rounded-xl transition-colors">
<span class="material-symbols-outlined text-[20px]">sync_alt</span>
                    Test Connection
                </button>
</div>
</section>
<!-- Section: Email SMTP -->
<section class="mt-8">
<div class="flex items-center justify-between px-4">
<h2 class="text-slate-900 dark:text-white text-[22px] font-bold leading-tight tracking-[-0.015em] pt-5 pb-3">Email SMTP</h2>
<div class="flex items-center gap-1.5 pt-5 pb-3">
<span class="flex size-2 rounded-full bg-slate-400"></span>
<span class="text-xs font-medium text-slate-500">Not Tested</span>
</div>
</div>
<div class="px-4 py-2 space-y-4">
<div class="grid grid-cols-3 gap-4">
<label class="flex flex-col col-span-2">
<p class="text-slate-700 dark:text-white text-base font-medium leading-normal pb-2">SMTP Host</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-white focus:outline-0 focus:ring-1 focus:ring-primary border border-slate-200 dark:border-[#3b4354] bg-white dark:bg-[#1b1f27] h-14 p-[15px] text-base font-normal leading-normal" value="smtp.gmail.com"/>
</label>
<label class="flex flex-col">
<p class="text-slate-700 dark:text-white text-base font-medium leading-normal pb-2">Port</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-white focus:outline-0 focus:ring-1 focus:ring-primary border border-slate-200 dark:border-[#3b4354] bg-white dark:bg-[#1b1f27] h-14 p-[15px] text-base font-normal leading-normal" value="587"/>
</label>
</div>
<div class="flex items-center justify-between py-2">
<div class="flex flex-col">
<p class="text-slate-700 dark:text-white text-base font-medium">SSL / TLS</p>
<p class="text-xs text-slate-500">Enable secure encrypted connection</p>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-slate-200 dark:bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<button class="w-full flex items-center justify-center gap-2 bg-slate-200 dark:bg-primary/20 hover:bg-primary/30 text-primary font-bold py-4 rounded-xl transition-colors">
<span class="material-symbols-outlined text-[20px]">send</span>
                    Send Test Email
                </button>
</div>
</section>
<!-- Section: Webhooks -->
<section class="mt-8">
<div class="flex items-center justify-between px-4">
<h2 class="text-slate-900 dark:text-white text-[22px] font-bold leading-tight tracking-[-0.015em] pt-5 pb-3">Webhooks</h2>
</div>
<div class="px-4 py-2 space-y-4">
<div class="flex flex-wrap items-end gap-4">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-700 dark:text-white text-base font-medium leading-normal pb-2">Payload URL</p>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-white focus:outline-0 focus:ring-1 focus:ring-primary border border-slate-200 dark:border-[#3b4354] bg-white dark:bg-[#1b1f27] h-14 p-[15px] text-base font-normal leading-normal pr-12" value="https://api.greenwich.edu.vn/hooks/grad"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer text-slate-400">content_copy</span>
</div>
</label>
</div>
<div class="bg-slate-100 dark:bg-[#1b1f27] rounded-xl p-4 space-y-3">
<p class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Events to subscribe</p>
<div class="space-y-3">
<label class="flex items-center gap-3">
<input checked="" class="w-5 h-5 rounded border-slate-300 dark:border-[#3b4354] bg-transparent text-primary focus:ring-primary" type="checkbox"/>
<span class="text-slate-700 dark:text-white text-sm">Student Registration Complete</span>
</label>
<label class="flex items-center gap-3">
<input checked="" class="w-5 h-5 rounded border-slate-300 dark:border-[#3b4354] bg-transparent text-primary focus:ring-primary" type="checkbox"/>
<span class="text-slate-700 dark:text-white text-sm">Payment Transaction Success</span>
</label>
<label class="flex items-center gap-3">
<input class="w-5 h-5 rounded border-slate-300 dark:border-[#3b4354] bg-transparent text-primary focus:ring-primary" type="checkbox"/>
<span class="text-slate-700 dark:text-white text-sm">Certificate Generation Failure</span>
</label>
</div>
</div>
<button class="w-full flex items-center justify-center gap-2 bg-slate-200 dark:bg-primary/20 hover:bg-primary/30 text-primary font-bold py-4 rounded-xl transition-colors">
<span class="material-symbols-outlined text-[20px]">webhook</span>
                    Ping Endpoint
                </button>
</div>
</section>
<!-- Last Synced Status -->
<div class="px-4 mt-8 mb-4">
<div class="flex items-center justify-center gap-2 py-3 px-4 bg-yellow-500/10 border border-yellow-500/20 rounded-lg">
<span class="material-symbols-outlined text-yellow-500 text-sm">history</span>
<p class="text-xs text-yellow-600 dark:text-yellow-500 font-medium">Last changes saved 2 hours ago by admin_tech</p>
</div>
</div>
</main>
<!-- Bottom Action Bar -->
<footer class="fixed bottom-0 left-0 right-0 bg-white dark:bg-background-dark border-t border-slate-200 dark:border-[#3b4354] p-4 flex gap-4">
<button class="flex-1 bg-primary text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 active:scale-95 transition-all">
            Save All Configurations
        </button>
</footer>
</body></html>
