<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Export Student Reports</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#0a47c2",
                "accent-orange": "#f58220",
                "background-light": "#f5f6f8",
                "background-dark": "#101622",
                "surface-dark": "#1b1f27",
                "border-dark": "#3b4354",
              },
              fontFamily: {
                "display": ["Inter", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .radio-dot-svg {
            --radio-dot-svg: url('data:image/svg+xml,%3csvg viewBox=%270 0 16 16%27 fill=%27rgb(255,255,255)%27 xmlns=%27http://www.w3.org/2000/svg%27%3e%3ccircle cx=%278%27 cy=%278%27 r=%273%27/%3e%3c/svg%3e');
        }
        .select-button-svg {
            --select-button-svg: url('data:image/svg+xml,%3csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2724px%27 height=%2724px%27 fill=%27rgb(156,166,186)%27 viewBox=%270 0 256 256%27%3e%3cpath d=%27M181.66,170.34a8,8,0,0,1,0,11.32l-48,48a8,8,0,0,1-11.32,0l-48-48a8,8,0,0,1,11.32-11.32L128,212.69l42.34-42.35A8,8,0,0,1,181.66,170.34Zm-96-84.68L128,43.31l42.34,42.35a8,8,0,0,0,11.32-11.32l-48-48a8,8,0,0,0-11.32,0l-48,48A8,8,0,0,0,85.66,85.66Z%27%3e%3c/path%3e%3c/svg%3e');
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-white font-display">
<div class="relative flex h-screen w-full flex-col overflow-x-hidden">
<!-- TopAppBar -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-50">
<div class="text-gray-900 dark:text-white flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined cursor-pointer">close</span>
</div>
<h2 class="text-gray-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Export Reports</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 bg-transparent text-gray-900 dark:text-white gap-2 text-base font-bold leading-normal tracking-[0.015em] min-w-0 p-0">
<span class="material-symbols-outlined">help_outline</span>
</button>
</div>
</div>
<div class="flex-1 overflow-y-auto pb-32">
<!-- SectionHeader: Report Type -->
<h3 class="text-gray-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] px-4 pb-2 pt-6">Report Type</h3>
<!-- RadioList: Report Types -->
<div class="flex flex-col gap-3 p-4 radio-dot-svg">
<label class="flex items-center gap-4 rounded-xl border border-solid border-gray-200 dark:border-border-dark p-4 flex-row-reverse bg-white dark:bg-surface-dark transition-all active:scale-[0.98]">
<input checked="" class="h-5 w-5 border-2 border-gray-300 dark:border-border-dark bg-transparent text-transparent checked:border-primary dark:checked:border-white checked:bg-[image:--radio-dot-svg] focus:outline-none focus:ring-0 focus:ring-offset-0 checked:focus:border-primary dark:checked:focus:border-white" name="report_type" type="radio"/>
<div class="flex grow flex-col">
<p class="text-gray-900 dark:text-white text-sm font-semibold leading-normal">General Attendance</p>
<p class="text-gray-500 dark:text-[#9ca6ba] text-xs font-normal leading-normal">Track student presence and check-in logs</p>
</div>
</label>
<label class="flex items-center gap-4 rounded-xl border border-solid border-gray-200 dark:border-border-dark p-4 flex-row-reverse bg-white dark:bg-surface-dark transition-all active:scale-[0.98]">
<input class="h-5 w-5 border-2 border-gray-300 dark:border-border-dark bg-transparent text-transparent checked:border-primary dark:checked:border-white checked:bg-[image:--radio-dot-svg] focus:outline-none focus:ring-0 focus:ring-offset-0 checked:focus:border-primary dark:checked:focus:border-white" name="report_type" type="radio"/>
<div class="flex grow flex-col">
<p class="text-gray-900 dark:text-white text-sm font-semibold leading-normal">Gown Collection List</p>
<p class="text-gray-500 dark:text-[#9ca6ba] text-xs font-normal leading-normal">Manage gown sizes, deposits, and returns</p>
</div>
</label>
<label class="flex items-center gap-4 rounded-xl border border-solid border-gray-200 dark:border-border-dark p-4 flex-row-reverse bg-white dark:bg-surface-dark transition-all active:scale-[0.98]">
<input class="h-5 w-5 border-2 border-gray-300 dark:border-border-dark bg-transparent text-transparent checked:border-primary dark:checked:border-white checked:bg-[image:--radio-dot-svg] focus:outline-none focus:ring-0 focus:ring-offset-0 checked:focus:border-primary dark:checked:focus:border-white" name="report_type" type="radio"/>
<div class="flex grow flex-col">
<p class="text-gray-900 dark:text-white text-sm font-semibold leading-normal">Payment Summary</p>
<p class="text-gray-500 dark:text-[#9ca6ba] text-xs font-normal leading-normal">Financial overview of graduation fees</p>
</div>
</label>
<label class="flex items-center gap-4 rounded-xl border border-solid border-gray-200 dark:border-border-dark p-4 flex-row-reverse bg-white dark:bg-surface-dark transition-all active:scale-[0.98]">
<input class="h-5 w-5 border-2 border-gray-300 dark:border-border-dark bg-transparent text-transparent checked:border-primary dark:checked:border-white checked:bg-[image:--radio-dot-svg] focus:outline-none focus:ring-0 focus:ring-offset-0 checked:focus:border-primary dark:checked:focus:border-white" name="report_type" type="radio"/>
<div class="flex grow flex-col">
<p class="text-gray-900 dark:text-white text-sm font-semibold leading-normal">Guest Seating List</p>
<p class="text-gray-500 dark:text-[#9ca6ba] text-xs font-normal leading-normal">Seat assignments and invitation status</p>
</div>
</label>
</div>
<!-- SectionHeader: Format -->
<h3 class="text-gray-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] px-4 pb-2 pt-4">Export Format</h3>
<div class="px-4 py-2">
<div class="flex bg-gray-200 dark:bg-surface-dark p-1 rounded-lg">
<button class="flex-1 py-2 text-sm font-semibold rounded-md bg-white dark:bg-border-dark text-gray-900 dark:text-white shadow-sm">Excel (.xlsx)</button>
<button class="flex-1 py-2 text-sm font-semibold text-gray-500 dark:text-gray-400">PDF Document</button>
</div>
</div>
<!-- SectionHeader: Filters -->
<h3 class="text-gray-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] px-4 pb-2 pt-6">Filter Data</h3>
<div class="flex flex-col gap-4 px-4 py-3 select-button-svg">
<!-- TextField: Major -->
<label class="flex flex-col w-full">
<p class="text-gray-700 dark:text-white text-sm font-medium leading-normal pb-2">Major</p>
<select class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-gray-900 dark:text-white focus:outline-0 focus:ring-0 border border-gray-200 dark:border-border-dark bg-white dark:bg-surface-dark focus:border-primary dark:focus:border-primary h-14 bg-[image:--select-button-svg] bg-[position:right_15px_center] bg-no-repeat appearance-none placeholder:text-[#9ca6ba] p-[15px] text-base font-normal leading-normal">
<option value="">All Majors</option>
<option value="it">Information Technology</option>
<option value="business">Business Management</option>
<option value="design">Graphic Design</option>
</select>
</label>
<!-- TextField: Batch -->
<label class="flex flex-col w-full">
<p class="text-gray-700 dark:text-white text-sm font-medium leading-normal pb-2">Graduation Batch</p>
<select class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-gray-900 dark:text-white focus:outline-0 focus:ring-0 border border-gray-200 dark:border-border-dark bg-white dark:bg-surface-dark focus:border-primary dark:focus:border-primary h-14 bg-[image:--select-button-svg] bg-[position:right_15px_center] bg-no-repeat appearance-none placeholder:text-[#9ca6ba] p-[15px] text-base font-normal leading-normal">
<option value="">Select Batch</option>
<option value="2023">Batch 2023</option>
<option value="2024">Batch 2024</option>
</select>
</label>
<!-- TextField: Status -->
<label class="flex flex-col w-full">
<p class="text-gray-700 dark:text-white text-sm font-medium leading-normal pb-2">Student Status</p>
<select class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-gray-900 dark:text-white focus:outline-0 focus:ring-0 border border-gray-200 dark:border-border-dark bg-white dark:bg-surface-dark focus:border-primary dark:focus:border-primary h-14 bg-[image:--select-button-svg] bg-[position:right_15px_center] bg-no-repeat appearance-none placeholder:text-[#9ca6ba] p-[15px] text-base font-normal leading-normal">
<option value="all">All Students</option>
<option value="eligible">Eligible</option>
<option value="pending">Pending Review</option>
</select>
</label>
</div>
<!-- Progress Section (Hidden by default, shown during generation) -->
<div class="px-4 py-6">
<div class="flex justify-between items-center mb-2">
<span class="text-xs font-semibold text-primary dark:text-accent-orange uppercase tracking-wider">Generating File</span>
<span class="text-xs font-bold text-gray-900 dark:text-white">65%</span>
</div>
<div class="w-full bg-gray-200 dark:bg-surface-dark rounded-full h-2.5">
<div class="bg-primary h-2.5 rounded-full transition-all duration-500" style="width: 65%"></div>
</div>
<p class="text-gray-500 dark:text-gray-400 text-xs mt-3 italic">Gathering student data and formatting rows...</p>
</div>
</div>
<!-- Footer Action Button -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-background-light dark:bg-background-dark border-t border-gray-200 dark:border-border-dark">
<button class="w-full bg-primary hover:bg-blue-700 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition-colors shadow-lg shadow-primary/20">
<span class="material-symbols-outlined">download</span>
                Generate &amp; Export Report
            </button>
</div>
</div>
</body></html>
