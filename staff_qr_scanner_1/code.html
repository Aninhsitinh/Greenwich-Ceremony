<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Staff QR Scanner - FPT Greenwich</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1152d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .scanner-frame {
            position: relative;
            width: 280px;
            height: 280px;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .scanner-corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border-color: #1152d4;
            border-style: solid;
        }
        .corner-tl { top: -2px; left: -2px; border-width: 4px 0 0 4px; border-top-left-radius: 8px; }
        .corner-tr { top: -2px; right: -2px; border-width: 4px 4px 0 0; border-top-right-radius: 8px; }
        .corner-bl { bottom: -2px; left: -2px; border-width: 0 0 4px 4px; border-bottom-left-radius: 8px; }
        .corner-br { bottom: -2px; right: -2px; border-width: 0 4px 4px 0; border-bottom-right-radius: 8px; }
        
        .scan-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #1152d4, transparent);
            box-shadow: 0 0 15px #1152d4;
            width: 100%;
            position: absolute;
            top: 50%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white overflow-hidden h-screen flex flex-col">
<!-- TopAppBar -->
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between z-10">
<div class="text-white flex size-12 shrink-0 items-center cursor-pointer">
<span class="material-symbols-outlined text-white">arrow_back_ios</span>
</div>
<h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Scan Student QR</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 bg-transparent text-white gap-2 text-base font-bold leading-normal tracking-[0.015em] min-w-0 p-0">
<span class="material-symbols-outlined text-white">help</span>
</button>
</div>
</header>
<!-- Main Scanner Viewport -->
<main class="flex-1 relative flex flex-col items-center justify-center overflow-hidden bg-black">
<!-- Mock Camera Background -->
<div class="absolute inset-0 z-0 opacity-60 bg-cover bg-center" data-alt="Dark blurred background representing a graduation ceremony hall" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuATNMwClgWtco9oVejGZfmup-76JkLmYFuQee5kYexC4x-R9l63FE3LWEydXMWN-8Z7maeQcXzJGa4z0MDGzcE_6LBhsJwB9VfxQy2vRgfNs90_HKpjFoBCwyhugZkT29pU5UIacD7NzZSBMJi_fBYLO-sC7iOphvBlaMyh_7SB68lDW8mwEbZ0UyW3uEcVrhS1sUUvKk_vtA2EGyFvQjuxUazmPNKnntfc6U9EKv8aiNUSAlVx2aSFKiHWbw8_cqxF6Zy5U2m7Vw');"></div>
<div class="absolute inset-0 bg-black/40 z-0"></div>
<!-- Viewfinder UI -->
<div class="z-10 flex flex-col items-center">
<div class="scanner-frame rounded-lg">
<div class="scanner-corner corner-tl"></div>
<div class="scanner-corner corner-tr"></div>
<div class="scanner-corner corner-bl"></div>
<div class="scanner-corner corner-br"></div>
<div class="scan-line"></div>
</div>
<!-- HeadlineText -->
<div class="mt-8">
<h3 class="text-white tracking-light text-2xl font-bold leading-tight px-4 text-center">Align QR code within frame</h3>
<!-- BodyText -->
<p class="text-white/80 text-base font-normal leading-normal pb-3 pt-2 px-4 text-center">FPT Greenwich Graduation 2024</p>
</div>
</div>
<!-- Confirmation Overlay Card (Successful Scan Simulation) -->
<div class="absolute bottom-32 left-4 right-4 z-20">
<div class="flex items-stretch justify-between gap-4 rounded-xl bg-background-dark/95 border border-white/10 p-4 shadow-2xl backdrop-blur-md">
<div class="flex flex-[2_2_0px] flex-col gap-4">
<div class="flex flex-col gap-1">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-green-500 text-lg">check_circle</span>
<p class="text-green-500 text-xs font-bold uppercase tracking-wider">Student Verified</p>
</div>
<p class="text-white text-xl font-bold leading-tight">Nguyen Van A</p>
<p class="text-[#9da6b9] text-sm font-normal leading-normal">GBS12345 • Bachelor of IT</p>
</div>
<div class="flex gap-2">
<button class="flex min-w-[100px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-primary text-white gap-2 text-sm font-bold leading-normal">
<span>Confirm Entry</span>
</button>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-[#282e39] text-white gap-1 text-sm font-medium leading-normal">
<span class="truncate">Dismiss</span>
</button>
</div>
</div>
<div class="w-24 h-24 bg-center bg-no-repeat bg-cover rounded-lg flex-shrink-0 border border-white/20" data-alt="Portrait of a male student in graduation gown" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCUUk0v-gBeIKbyJO5Me0eyiEgIDLjF9BaDxCh7t_NYrwCZcp_tyNOUntVsYCKPLdfNsyGDBua0AOFB6ABuGtc54-9v9Lnn_bDr3k9iRGvSL4txutV6xdCHZHwRuXTJ_hd86RWxrVMkgGhsKiVAyUI9Nh7yUrP8-PUTF4eTGT8dyzrr7psidTDOCR3WoxQYUFGGzSSeQQIDal_Y9H1su1Y7-jmOTncltNC0eDMJozbeUZKbb6R5RsLGZb_5h_Bi_hfh_E7nR-qcAg");'></div>
</div>
</div>
</main>
<!-- CameraControl & Utilities -->
<footer class="bg-background-light dark:bg-background-dark pb-8 pt-4 px-6">
<div class="flex items-center justify-between max-w-sm mx-auto bg-black/20 rounded-full p-2 border border-white/5">
<!-- Flash Toggle -->
<button class="flex shrink-0 items-center justify-center rounded-full size-12 bg-white/10 text-white hover:bg-white/20 transition-colors">
<span class="material-symbols-outlined text-inherit">flashlight_on</span>
</button>
<!-- Shutter/Center Button (Optional Stylistic element) -->
<button class="flex shrink-0 items-center justify-center rounded-full size-16 bg-primary text-white shadow-lg shadow-primary/40">
<span class="material-symbols-outlined text-inherit text-3xl">qr_code_scanner</span>
</button>
<!-- Manual Entry Toggle -->
<button class="flex shrink-0 items-center justify-center rounded-full size-12 bg-white/10 text-white hover:bg-white/20 transition-colors">
<span class="material-symbols-outlined text-inherit">keyboard</span>
</button>
</div>
<div class="flex justify-center mt-4">
<p class="text-[#9da6b9] text-xs font-medium uppercase tracking-widest">Manual Entry</p>
</div>
<!-- Safe Area Spacer for iOS -->
<div class="h-2"></div>
</footer>
</body></html>
