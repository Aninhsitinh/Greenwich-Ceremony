<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Hall Seating Map Editor - FPT Greenwich</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                        "vip-gold": "#FFD700",
                        "student-navy": "#1E3A8A",
                        "guest-blue": "#60A5FA",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .seat-grid {
            background-image: radial-gradient(circle, #1e293b 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .seat {
            width: 14px;
            height: 14px;
            margin: 2px;
            transition: all 0.2s;
        }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen overflow-hidden flex flex-col">
<!-- TopAppBar -->
<header class="flex items-center bg-background-light dark:bg-background-dark border-b border-slate-200 dark:border-slate-800 p-4 pb-4 justify-between sticky top-0 z-50">
<div class="flex items-center gap-3">
<div class="bg-primary text-white w-8 h-8 rounded flex items-center justify-center font-bold text-xs">
                FPT
            </div>
<h2 class="text-slate-900 dark:text-white text-sm font-bold leading-tight tracking-tight">Hall Layout Configuration</h2>
</div>
<div class="flex items-center gap-4">
<button class="text-primary text-sm font-bold tracking-wide">Save</button>
</div>
</header>
<!-- Toolbar: Undo/Redo & View Controls -->
<div class="flex justify-between items-center bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md px-4 py-2 border-b border-slate-200 dark:border-slate-800">
<div class="flex gap-1">
<button class="p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg">
<span class="material-symbols-outlined text-[20px]">undo</span>
</button>
<button class="p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg">
<span class="material-symbols-outlined text-[20px]">redo</span>
</button>
</div>
<div class="flex gap-3 items-center">
<span class="text-[10px] font-semibold uppercase tracking-widest text-slate-500">Scale: 100%</span>
<div class="flex border dark:border-slate-700 rounded-lg overflow-hidden">
<button class="px-3 py-1 bg-slate-100 dark:bg-slate-800 border-r dark:border-slate-700 text-xs">-</button>
<button class="px-3 py-1 bg-slate-100 dark:bg-slate-800 text-xs">+</button>
</div>
</div>
</div>
<!-- Main Canvas Area -->
<main class="flex-1 relative overflow-auto bg-[#0a0f18] seat-grid flex items-center justify-center p-8">
<!-- Visual Map Representation -->
<div class="relative inline-block">
<!-- Stage Label -->
<div class="mb-12 text-center">
<div class="w-64 h-8 bg-slate-800/50 border border-slate-700 rounded mx-auto flex items-center justify-center">
<span class="text-[10px] font-bold tracking-[0.4em] uppercase text-slate-400">Main Stage</span>
</div>
</div>
<!-- Seating Blocks -->
<div class="grid grid-cols-2 gap-12">
<!-- Left Block -->
<div class="flex flex-col gap-2">
<!-- Rows of seats -->
<div class="flex gap-1 items-center">
<span class="text-[9px] w-4 text-slate-600 font-bold">A</span>
<div class="flex">
<div class="seat rounded-sm bg-vip-gold shadow-[0_0_8px_rgba(255,215,0,0.3)]"></div>
<div class="seat rounded-sm bg-vip-gold shadow-[0_0_8px_rgba(255,215,0,0.3)]"></div>
<div class="seat rounded-sm bg-vip-gold shadow-[0_0_8px_rgba(255,215,0,0.3)]"></div>
<div class="seat rounded-sm bg-vip-gold shadow-[0_0_8px_rgba(255,215,0,0.3)]"></div>
<div class="seat rounded-sm bg-vip-gold shadow-[0_0_8px_rgba(255,215,0,0.3)]"></div>
</div>
</div>
<div class="flex gap-1 items-center">
<span class="text-[9px] w-4 text-slate-600 font-bold">B</span>
<div class="flex">
<div class="seat rounded-sm bg-student-navy"></div>
<div class="seat rounded-sm bg-student-navy border border-primary ring-1 ring-primary"></div>
<div class="seat rounded-sm bg-student-navy border border-primary ring-1 ring-primary"></div>
<div class="seat rounded-sm bg-student-navy border border-primary ring-1 ring-primary"></div>
<div class="seat rounded-sm bg-student-navy"></div>
</div>
</div>
<div class="flex gap-1 items-center">
<span class="text-[9px] w-4 text-slate-600 font-bold">C</span>
<div class="flex">
<div class="seat rounded-sm bg-student-navy"></div>
<div class="seat rounded-sm bg-student-navy"></div>
<div class="seat rounded-sm bg-student-navy"></div>
<div class="seat rounded-sm bg-student-navy"></div>
<div class="seat rounded-sm bg-student-navy"></div>
</div>
</div>
</div>
<!-- Right Block -->
<div class="flex flex-col gap-2">
<div class="flex gap-1 items-center">
<div class="flex">
<div class="seat rounded-sm bg-vip-gold"></div>
<div class="seat rounded-sm bg-vip-gold"></div>
<div class="seat rounded-sm bg-vip-gold"></div>
<div class="seat rounded-sm bg-vip-gold"></div>
<div class="seat rounded-sm bg-vip-gold"></div>
</div>
<span class="text-[9px] w-4 text-slate-600 font-bold">A</span>
</div>
<div class="flex gap-1 items-center">
<div class="flex">
<div class="seat rounded-sm bg-guest-blue"></div>
<div class="seat rounded-sm bg-guest-blue"></div>
<div class="seat rounded-sm bg-guest-blue"></div>
<div class="seat rounded-sm bg-guest-blue"></div>
<div class="seat rounded-sm bg-guest-blue"></div>
</div>
<span class="text-[9px] w-4 text-slate-600 font-bold">B</span>
</div>
<div class="flex gap-1 items-center">
<div class="flex">
<div class="seat rounded-sm bg-guest-blue"></div>
<div class="seat rounded-sm bg-guest-blue"></div>
<div class="seat rounded-sm bg-guest-blue"></div>
<div class="seat rounded-sm bg-guest-blue"></div>
<div class="seat rounded-sm bg-guest-blue"></div>
</div>
<span class="text-[9px] w-4 text-slate-600 font-bold">C</span>
</div>
</div>
</div>
<!-- Drag Selection Overlay Box (Simulated) -->
<div class="absolute top-[52px] left-[18px] w-24 h-6 border-2 border-primary/50 bg-primary/10 rounded pointer-events-none"></div>
<!-- Selection Badge -->
<div class="absolute -bottom-16 left-1/2 -translate-x-1/2 bg-primary px-3 py-1 rounded-full shadow-lg shadow-primary/20">
<span class="text-white text-[10px] font-bold whitespace-nowrap">3 Seats Selected</span>
</div>
</div>
</main>
<!-- Category Tabs / Bottom Sheet Trigger Area -->
<div class="bg-background-light dark:bg-background-dark border-t border-slate-200 dark:border-slate-800 pb-safe">
<!-- Structural Tools (Chips) -->
<div class="flex gap-3 p-3 overflow-x-auto no-scrollbar">
<button class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-xl bg-slate-200 dark:bg-slate-800 pl-3 pr-4 border border-transparent active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[20px] text-primary">add_box</span>
<p class="text-slate-900 dark:text-white text-xs font-semibold leading-normal">Add Row</p>
</button>
<button class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-xl bg-slate-200 dark:bg-slate-800 pl-3 pr-4 border border-transparent active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[20px] text-primary">grid_view</span>
<p class="text-slate-900 dark:text-white text-xs font-semibold leading-normal">Add Block</p>
</button>
<button class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-xl bg-slate-200 dark:bg-slate-800 pl-3 pr-4 border border-transparent active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[20px] text-primary">payments</span>
<p class="text-slate-900 dark:text-white text-xs font-semibold leading-normal">Set Pricing</p>
</button>
</div>
<!-- Seat Category Selection (Tabs) -->
<div class="pb-3 pt-1">
<div class="flex border-b border-slate-200 dark:border-slate-800 px-4 gap-6">
<a class="flex flex-col items-center justify-center border-b-[3px] border-b-primary text-slate-900 dark:text-white pb-3 pt-2" href="#">
<div class="w-3 h-3 rounded-full bg-vip-gold mb-1"></div>
<p class="text-[11px] font-bold uppercase tracking-wider">VIP</p>
</a>
<a class="flex flex-col items-center justify-center border-b-[3px] border-b-transparent text-slate-500 pb-3 pt-2" href="#">
<div class="w-3 h-3 rounded-full bg-student-navy mb-1"></div>
<p class="text-[11px] font-bold uppercase tracking-wider">Student</p>
</a>
<a class="flex flex-col items-center justify-center border-b-[3px] border-b-transparent text-slate-500 pb-3 pt-2" href="#">
<div class="w-3 h-3 rounded-full bg-guest-blue mb-1"></div>
<p class="text-[11px] font-bold uppercase tracking-wider">Guest</p>
</a>
<a class="flex flex-col items-center justify-center border-b-[3px] border-b-transparent text-slate-500 pb-3 pt-2" href="#">
<div class="w-3 h-3 rounded-full bg-slate-400 mb-1"></div>
<p class="text-[11px] font-bold uppercase tracking-wider">Reserved</p>
</a>
</div>
</div>
<!-- Legend Overlay (Mini Card on bottom right) -->
<div class="px-4 py-3 bg-slate-50 dark:bg-slate-900/50 flex items-center justify-between">
<div class="flex gap-4">
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-vip-gold"></div>
<span class="text-[10px] text-slate-500">Gold</span>
</div>
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-student-navy"></div>
<span class="text-[10px] text-slate-500">Navy</span>
</div>
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-guest-blue"></div>
<span class="text-[10px] text-slate-500">Light Blue</span>
</div>
</div>
<button class="bg-primary/10 text-primary p-2 rounded-lg">
<span class="material-symbols-outlined text-[18px]">info</span>
</button>
</div>
</div>
<!-- Map Thumbnail Overlay (Optional Nav) -->
<div class="absolute bottom-48 right-4 w-20 h-20 rounded-lg overflow-hidden border border-slate-200 dark:border-slate-800 shadow-2xl bg-white dark:bg-slate-900/80 backdrop-blur-sm p-1">
<div class="w-full h-full bg-slate-800 rounded relative">
<div class="absolute top-2 left-2 w-1/2 h-1/3 border border-primary bg-primary/20"></div>
</div>
</div>
</body></html>
