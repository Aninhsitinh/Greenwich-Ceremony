<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Password Reset Success - FPT Greenwich</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0a47c2",
                        "accent-orange": "#f27024",
                        "background-light": "#f5f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Lexend', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark transition-colors duration-300">
<div class="relative flex h-screen w-full flex-col overflow-x-hidden max-w-[430px] mx-auto bg-white dark:bg-background-dark shadow-2xl">
<!-- Top Status Bar Area (iOS Style Spacer) -->
<div class="flex items-center bg-transparent p-4 pb-2 justify-end h-12">
<div class="flex gap-2 text-[#111318] dark:text-white">
<span class="material-symbols-outlined text-[20px]">signal_cellular_alt</span>
<span class="material-symbols-outlined text-[20px]">wifi</span>
<span class="material-symbols-outlined text-[20px]">battery_full</span>
</div>
</div>
<!-- Main Content Area -->
<div class="flex flex-col flex-grow items-center justify-center px-6">
<!-- Success Illustration/Icon -->
<div class="relative mb-8 flex items-center justify-center">
<!-- Background decorative circles -->
<div class="absolute w-48 h-48 bg-accent-orange/10 dark:bg-accent-orange/20 rounded-full scale-110"></div>
<div class="absolute w-36 h-36 bg-accent-orange/20 dark:bg-accent-orange/30 rounded-full scale-100"></div>
<!-- Main Orange Checkmark -->
<div class="relative z-10 w-24 h-24 bg-accent-orange rounded-full flex items-center justify-center shadow-lg shadow-accent-orange/40">
<span class="material-symbols-outlined text-white text-[56px]">check_circle</span>
</div>
</div>
<!-- Headline Text -->
<h1 class="text-[#111318] dark:text-white tracking-tight text-[28px] font-bold leading-tight text-center pb-3">
                Password Updated Successfully!
            </h1>
<!-- Body Text -->
<p class="text-[#4F5B73] dark:text-gray-400 text-base font-normal leading-relaxed text-center px-4">
                Your password has been changed successfully. You can now use your new credentials to log in to the Graduation App.
            </p>
<!-- Decorative Visual (Optional/Thematic) -->
<div class="mt-8 w-full max-w-[200px] opacity-10 dark:opacity-20">
<div class="h-1 w-full bg-gradient-to-r from-transparent via-primary to-transparent rounded-full"></div>
</div>
</div>
<!-- Action Button Area -->
<div class="flex flex-col px-6 pb-12 w-full gap-4">
<!-- Primary Action Button -->
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary text-white text-base font-bold leading-normal tracking-wide shadow-lg shadow-primary/30 active:scale-[0.98] transition-transform">
<span class="truncate">Back to Login</span>
</button>
<!-- Secondary/Support Text -->
<p class="text-sm text-center text-[#111318]/50 dark:text-white/40 font-medium">
                FPT Greenwich University
            </p>
</div>
<!-- iOS Home Indicator Spacer -->
<div class="h-2 flex justify-center pb-4">
<div class="w-32 h-1.5 bg-gray-300 dark:bg-gray-700 rounded-full"></div>
</div>
</div>
</body></html>
