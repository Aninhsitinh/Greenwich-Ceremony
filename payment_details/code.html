<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Payment Details - FPT Greenwich</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Lexend', sans-serif;
        }
        .ios-safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-white font-display min-h-screen flex flex-col overflow-x-hidden">
<!-- Top Navigation Bar -->
<div class="sticky top-0 z-50 flex items-center bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md p-4 pb-2 justify-between">
<div class="text-white flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined cursor-pointer">arrow_back_ios</span>
</div>
<h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Payment Details</h2>
</div>
<div class="flex-1 w-full max-w-md mx-auto px-4 pb-32">
<!-- Brand Section -->
<div class="py-6 flex flex-col items-center gap-4">
<div class="w-20 h-20 rounded-full bg-gradient-to-br from-primary to-blue-800 flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-4xl text-white">school</span>
</div>
<div class="text-center">
<h1 class="text-xl font-bold">FPT Greenwich</h1>
<p class="text-sm text-[#9dabb9]">Graduation Ceremony 2024</p>
</div>
</div>
<!-- Summary Section -->
<div class="mt-4">
<h3 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] pb-2">Summary</h3>
<div class="bg-white/5 rounded-xl p-4 border border-white/10">
<div class="flex justify-between gap-x-6 py-2">
<p class="text-[#9dabb9] text-sm font-normal leading-normal">Ceremony fee</p>
<p class="text-white text-sm font-normal leading-normal text-right">$50.00</p>
</div>
<div class="flex justify-between gap-x-6 py-2">
<div class="flex flex-col">
<p class="text-[#9dabb9] text-sm font-normal leading-normal">Gown deposit</p>
<span class="text-[10px] text-green-400 font-medium uppercase tracking-wider">Refundable</span>
</div>
<p class="text-white text-sm font-normal leading-normal text-right">$30.00</p>
</div>
<div class="flex justify-between gap-x-6 py-2 border-b border-white/10 pb-4">
<p class="text-[#9dabb9] text-sm font-normal leading-normal">Guest tickets (x2)</p>
<p class="text-white text-sm font-normal leading-normal text-right">$20.00</p>
</div>
<div class="flex justify-between gap-x-6 pt-4 items-baseline">
<p class="text-white text-base font-bold leading-normal">Total</p>
<p class="text-primary text-2xl font-bold leading-normal text-right">$100.00</p>
</div>
</div>
</div>
<!-- Payment Method Section -->
<div class="mt-8">
<h3 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] pb-4">Select Payment Method</h3>
<div class="space-y-3">
<!-- Momo -->
<label class="relative flex items-center p-4 rounded-xl border-2 border-primary bg-primary/10 cursor-pointer group">
<input checked="" class="hidden peer" name="payment" type="radio"/>
<div class="flex items-center gap-4 w-full">
<div class="w-10 h-10 rounded-lg bg-[#A50064] flex items-center justify-center shrink-0">
<img alt="Momo Logo" class="w-6 h-6 object-contain" data-alt="Momo e-wallet logo pink square" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAeKSoSGLwq3cEORBRp-xgWjS5KjPxvqL107plB8Cw_-WFezVYNH6UbrI9tHup9jda3uYFTnmtPrjWqT1VrWM1S-tHRIJyh69CtGpQFHbrp6aAWGCUu4zgBJXwYzBKFoxoNk1BcTIDXLTSi5bvY-LwlqORESBAd8znC6bJ9IBUsD-CCrmxZUW6huu4cXQ8Bz1A9IsACS2yLCk4CTEweiHkH84CW4nvTC9zq61JCQnpAdVrVTPUt9E6sgaAqs7AylCdrWKXNN0W15w"/>
</div>
<div class="flex-1">
<p class="text-white font-medium">MoMo E-wallet</p>
<p class="text-[#9dabb9] text-xs">Instant payment via app</p>
</div>
<span class="material-symbols-outlined text-primary">check_circle</span>
</div>
</label>
<!-- VNPay -->
<label class="relative flex items-center p-4 rounded-xl border border-white/10 bg-white/5 cursor-pointer hover:bg-white/10 transition-colors">
<input class="hidden peer" name="payment" type="radio"/>
<div class="flex items-center gap-4 w-full">
<div class="w-10 h-10 rounded-lg bg-white flex items-center justify-center shrink-0 p-1">
<img alt="VNPay Logo" class="w-full h-auto" data-alt="VNPay qr code payment logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCFyb0mIZoiK7eLAbjIF2hb-IucFIiEpFU0p1UfdARcG-ERia0JXcj6uLAYCLDg60E4KS7gRGQdtB7m0nXXK8fmUP0akVB533bsEMI5ZCsNEzuJAI2cC0PUXsGG7dl1O9XJkeFqn2VYqQZl9YKXjeF9qpzzuRGW3XGfLLnmpDX9df7s0ZdUzfuT4cbkD5UuWTb34XJnOIF9Vv-OkWE_l_cvgSC0h8opMa8FKeMDj4B9s1Y3akr1LjjBMgE78k1YWZ5h1olQFjHang"/>
</div>
<div class="flex-1">
<p class="text-white font-medium">VNPay</p>
<p class="text-[#9dabb9] text-xs">QR Code payment</p>
</div>
<div class="w-6 h-6 rounded-full border border-white/20"></div>
</div>
</label>
<!-- Bank Transfer -->
<label class="relative flex items-center p-4 rounded-xl border border-white/10 bg-white/5 cursor-pointer hover:bg-white/10 transition-colors">
<input class="hidden peer" name="payment" type="radio"/>
<div class="flex items-center gap-4 w-full">
<div class="w-10 h-10 rounded-lg bg-white/10 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-white">account_balance</span>
</div>
<div class="flex-1">
<p class="text-white font-medium">Bank Transfer</p>
<p class="text-[#9dabb9] text-xs">Manual transfer via bank app</p>
</div>
<div class="w-6 h-6 rounded-full border border-white/20"></div>
</div>
</label>
</div>
</div>
<!-- Security Badge -->
<div class="mt-8 flex items-center justify-center gap-2 text-[#9dabb9]">
<span class="material-symbols-outlined text-sm">lock</span>
<span class="text-xs uppercase tracking-tighter">Secure 256-bit SSL Encrypted Payment</span>
</div>
</div>
<!-- Sticky Bottom Button -->
<div class="fixed bottom-0 left-0 right-0 bg-background-light dark:bg-background-dark border-t border-white/10 p-4 ios-safe-bottom">
<div class="max-w-md mx-auto">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span>Confirm Payment</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
</body></html>
