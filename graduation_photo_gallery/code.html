<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Graduation Photo Gallery</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#094bae",
                        "accent": "#f58020",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0a0c10",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .masonry-grid {
            column-count: 2;
            column-gap: 0.75rem;
        }
        .masonry-item {
            break-inside: avoid;
            margin-bottom: 0.75rem;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background-light dark:bg-background-dark font-display text-white">

<div class="sticky top-0 z-50 bg-background-dark/80 backdrop-blur-md border-b border-white/10">
<div class="flex items-center p-4 pb-2 justify-between">
<div class="text-white flex size-12 shrink-0 items-center">
<span class="material-symbols-outlined">arrow_back_ios</span>
</div>
<div class="flex flex-col items-center flex-1">

<div class="flex w-12 items-center justify-end">
<button class="flex items-center justify-center rounded-full h-10 w-10 bg-white/5 border border-white/10 text-white">
<span class="material-symbols-outlined">face</span>
</button>
</div>
</div>
<!-- Search Bar Component -->

<label class="flex flex-col min-w-40 h-12 w-full">

</div>

<div class="flex items-center pr-4 text-accent">
<span class="material-symbols-outlined">center_focus_strong</span>
</div>
</div>
</label>
</div>
<!-- Filter Chips Component -->
<div class="flex gap-3 p-4 pt-0 overflow-x-auto no-scrollbar">
<div class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full bg-primary px-5 shadow-lg shadow-primary/20">
<p class="text-white text-sm font-semibold">All</p>
</div>
<div class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full bg-[#1c2128] border border-white/10 px-5">

</div>
<div class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full bg-[#1c2128] border border-white/10 px-5">

<div class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full bg-[#1c2128] border border-white/10 px-5">

</div>
</div>
</div>

<div class="flex flex-col items-center gap-1 text-gray-500">
