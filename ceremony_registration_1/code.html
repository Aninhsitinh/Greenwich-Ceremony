<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ceremony Registration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "fpt-orange": "#f26f21",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="sticky top-0 z-50 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800">
<div class="flex items-center p-4 justify-between max-w-md mx-auto">
<div class="text-primary flex size-10 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</div>
<h2 class="text-gray-900 dark:text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Ceremony Registration</h2>
</div>
</header>
<main class="flex-1 max-w-md mx-auto w-full pb-32">
<!-- ProfileHeader -->
<div class="p-4 @container">
<div class="flex w-full flex-col gap-4 bg-white dark:bg-[#1c2127] p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800">
<div class="flex gap-4 items-center">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full h-20 w-20 border-2 border-fpt-orange" data-alt="Student profile picture in graduation cap" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuD9vC1sdjuHPiqllQiJOgV1zq0V0we-s0a3xWo99_23goIVA5wDAxxtC6zJJq-iW1TSKSQNekdriSvsjd2mx8GAlBgmrDsHC4erkUUHHl4MQMlFgsmOORSvn-6aHHShreGfpha_tZtrAJYLLYFJm2cCJ7h7hhPZxQXQHP9IWhp-1OSy9b-40JCTSnaLfkdukW5xrrGkwlentU0AB5e90tnLcfJ3AQhnqE_KqN9YX48RPHLlCptspoeSpBEdUg6Dt2pOHRe-yAOExw");'>
</div>
<div class="flex flex-col justify-center">
<p class="text-gray-900 dark:text-white text-xl font-bold leading-tight">Nguyen Van A</p>
<p class="text-gray-500 dark:text-[#9dabb9] text-sm font-normal">ID: GCD12345 | Major: IT</p>
<div class="flex items-center gap-1 mt-1">
<span class="w-2 h-2 rounded-full bg-fpt-orange"></span>
<p class="text-gray-500 dark:text-[#9dabb9] text-xs font-medium uppercase tracking-wider">Greenwich Student</p>
</div>
</div>
</div>
</div>
</div>
<!-- Section: Graduation Details -->
<div class="px-4">
<h3 class="text-gray-900 dark:text-white text-lg font-bold leading-tight tracking-tight pb-3 pt-4">Graduation Details</h3>
<!-- TextField (Dropdown) -->
<div class="py-3">
<label class="flex flex-col w-full">
<p class="text-gray-700 dark:text-white text-sm font-medium pb-2 ml-1">Graduation Batch</p>
<div class="relative">
<select class="appearance-none flex w-full rounded-xl text-gray-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-gray-200 dark:border-[#3b4754] bg-white dark:bg-[#1c2127] h-14 px-4 text-base font-normal leading-normal transition-all">
<option disabled="" selected="" value="">Select your batch</option>
<option value="b2023">Batch 2023 - Autumn</option>
<option value="b2024-1">Batch 2024 - Spring</option>
<option value="b2024-2">Batch 2024 - Summer</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</label>
</div>
</div>
<!-- SectionHeader: Gown Size -->
<div class="px-4 mt-4">
<div class="flex justify-between items-end pb-3 pt-4">
<h3 class="text-gray-900 dark:text-white text-lg font-bold leading-tight tracking-tight">Gown Selection</h3>
<span class="text-primary text-xs font-semibold cursor-pointer hover:underline">Size Guide</span>
</div>
<!-- Custom Radio List for Gown Size -->
<div class="grid grid-cols-2 gap-3">
<label class="relative flex items-center p-4 rounded-xl border-2 border-gray-200 dark:border-[#3b4754] bg-white dark:bg-[#1c2127] cursor-pointer has-[:checked]:border-primary has-[:checked]:bg-primary/5 transition-all">
<input class="hidden peer" name="gown-size" type="radio" value="S"/>
<div class="flex flex-col">
<span class="text-gray-900 dark:text-white font-bold">Small (S)</span>
<span class="text-gray-500 dark:text-[#9dabb9] text-xs">Height: 150-160cm</span>
</div>
<span class="material-symbols-outlined ml-auto text-primary opacity-0 peer-checked:opacity-100 transition-opacity">check_circle</span>
</label>
<label class="relative flex items-center p-4 rounded-xl border-2 border-primary bg-primary/5 cursor-pointer transition-all">
<input checked="" class="hidden peer" name="gown-size" type="radio" value="M"/>
<div class="flex flex-col">
<span class="text-gray-900 dark:text-white font-bold">Medium (M)</span>
<span class="text-gray-500 dark:text-[#9dabb9] text-xs">Height: 160-170cm</span>
</div>
<span class="material-symbols-outlined ml-auto text-primary opacity-100 transition-opacity">check_circle</span>
</label>
<label class="relative flex items-center p-4 rounded-xl border-2 border-gray-200 dark:border-[#3b4754] bg-white dark:bg-[#1c2127] cursor-pointer has-[:checked]:border-primary has-[:checked]:bg-primary/5 transition-all">
<input class="hidden peer" name="gown-size" type="radio" value="L"/>
<div class="flex flex-col">
<span class="text-gray-900 dark:text-white font-bold">Large (L)</span>
<span class="text-gray-500 dark:text-[#9dabb9] text-xs">Height: 170-180cm</span>
</div>
<span class="material-symbols-outlined ml-auto text-primary opacity-0 peer-checked:opacity-100 transition-opacity">check_circle</span>
</label>
<label class="relative flex items-center p-4 rounded-xl border-2 border-gray-200 dark:border-[#3b4754] bg-white dark:bg-[#1c2127] cursor-pointer has-[:checked]:border-primary has-[:checked]:bg-primary/5 transition-all">
<input class="hidden peer" name="gown-size" type="radio" value="XL"/>
<div class="flex flex-col">
<span class="text-gray-900 dark:text-white font-bold">X-Large (XL)</span>
<span class="text-gray-500 dark:text-[#9dabb9] text-xs">Height: 180cm+</span>
</div>
<span class="material-symbols-outlined ml-auto text-primary opacity-0 peer-checked:opacity-100 transition-opacity">check_circle</span>
</label>
</div>
</div>
<!-- Ceremony Fee Notice -->
<div class="mx-4 mt-8 p-4 rounded-xl bg-primary/10 border border-primary/20 flex items-start gap-3">
<span class="material-symbols-outlined text-primary">info</span>
<div>
<p class="text-gray-900 dark:text-white text-sm font-bold">Registration Fee</p>
<p class="text-gray-600 dark:text-[#9dabb9] text-xs mt-1 leading-relaxed">The fee includes your graduation gown rental, 2 guest tickets, and the digital photo package.</p>
</div>
</div>
</main>
<!-- Bottom Actions & Navigation -->
<div class="fixed bottom-0 left-0 right-0 z-50">
<!-- Main Action Button -->
<div class="max-w-md mx-auto px-4 pb-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold h-14 rounded-2xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span>Confirm Registration</span>
<span class="material-symbols-outlined">how_to_reg</span>
</button>
</div>
<!-- iOS Bottom Tab Bar -->
<nav class="bg-white/80 dark:bg-[#1c2127]/80 backdrop-blur-xl border-t border-gray-200 dark:border-gray-800 pb-safe pb-4">
<div class="max-w-md mx-auto flex justify-around items-center pt-3 px-6">
<button class="flex flex-col items-center gap-1 text-gray-400">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium">Home</span>
</button>
<button class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined !fill-1">assignment</span>
<span class="text-[10px] font-medium">Register</span>
</button>
<button class="flex flex-col items-center gap-1 text-gray-400">
<span class="material-symbols-outlined">calendar_today</span>
<span class="text-[10px] font-medium">Schedule</span>
</button>
<button class="flex flex-col items-center gap-1 text-gray-400">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium">Profile</span>
</button>
</div>
</nav>
</div>
</body></html>
